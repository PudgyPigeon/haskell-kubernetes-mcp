apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Chart.Name }}
  ports:
    - name: mcp
      port: {{ .Values.config.port }}
      targetPort: {{ .Values.config.port }}
      protocol: TCP
    - name: health
      port: {{ .Values.config.healthPort }}
      targetPort: {{ .Values.config.healthPort }}
      protocol: TCP
